<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" /> -->
  <!-- No hace falta usar otra libreria que la de Icons8 -->

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="estilos/styles.css" />
  <title>Rumba</title>
  <link rel="shortcut icon" href="favicon.png" type="image/x-icon">
</head>

<body>
  <div class="container" id="container">

    <!-- REGISTRO -->
    <div class="form-container sign-up">
      <form>
        <img src="logo.png" alt="" class="logo-img">
        <h1 class="login-header">Crear Cuenta</h1>

        <div class="social-icons">
          <a href="#" class="icon">
            <img src="https://img.icons8.com/ios-filled/50/ffffff/google-logo.png" alt="Google">
          </a>
          <a href="#" class="icon">
            <img src="https://img.icons8.com/ios-filled/50/ffffff/facebook--v1.png" alt="Facebook">
          </a>
          <a href="#" class="icon">
            <img src="https://img.icons8.com/ios-filled/50/ffffff/github.png" alt="GitHub">
          </a>
          <a href="#" class="icon">
            <img src="https://img.icons8.com/ios-filled/50/ffffff/linkedin.png" alt="LinkedIn">
          </a>
        </div>

        <span>Usa tu correo electrónico para registrarte</span>

        <input type="text" id="regNombre" placeholder="Nombre" />
        <input type="email" id="regEmail" placeholder="Correo electrónico" />
        <input type="password" id="regPassword" placeholder="Contraseña" />

        <button type="button" id="btnRegistrar">Registrarse</button>
      </form>
    </div>

    <!-- LOGIN -->
    <div class="form-container sign-in">
      <form>
        <img src="logo.png" alt="" class="logo-img">
        <h1 class="login-header">Iniciar Sesión</h1>

        <div class="social-icons">
          <a href="#" class="icon">
            <img src="https://img.icons8.com/ios-filled/50/ffffff/google-logo.png" alt="Google">
          </a>
          <a href="#" class="icon">
            <img src="https://img.icons8.com/ios-filled/50/ffffff/facebook--v1.png" alt="Facebook">
          </a>
          <a href="#" class="icon">
            <img src="https://img.icons8.com/ios-filled/50/ffffff/github.png" alt="GitHub">
          </a>
          <a href="#" class="icon">
            <img src="https://img.icons8.com/ios-filled/50/ffffff/linkedin.png" alt="LinkedIn">
          </a>
        </div>

        <span>Usa tu correo electrónico y contraseña</span>

        <input type="email" id="logEmail" placeholder="Correo electrónico" />
        <input type="password" id="logPassword" placeholder="Contraseña" />

        <a href="#">¿Olvidaste tu contraseña?</a>

        <button type="button" id="btnLogin">Entrar</button>
      </form>
    </div>

    <!-- PANEL ANIMADO -->
    <div class="toggle-container">
      <div class="toggle">

        <div class="toggle-panel toggle-left">
          <h1>¡Listo para crear!</h1>
          <p class="text-highlight">Entra y organiza ese caos creativo a los que llamas “proyectos”.</p>
          <button class="hidden" id="login">Iniciar Sesión</button>
        </div>

        <div class="toggle-panel toggle-right">
          <h1>Tu Rumba</h1>
          <h1>Tu Cuenta</h1>
          <h1>Tu Orden</h1>
          <p class="text-highlight">
            Tu estudio, organizado.
          </p>
          <!-- <p class="text-secondary">¿No tienes cuenta? Créala aquí:</p> -->
          <button class="hidden" id="register">Registrarse</button>
        </div>

      </div>
    </div>

  </div>

  <script src="Java/Login.js"></script>
</body>

</html>
